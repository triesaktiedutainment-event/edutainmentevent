<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqezHbzExOlS1rTNXPq22cPVqqymBnoaFNuRCggHKC5dKWxRJVVOxhpAgpdpxLWuPj/exec'; // PASTIKAN SUDAH DIGANTI!

    async function fetchData() {
        const urlParams = new URLSearchParams(window.location.search);
        const userKey = urlParams.get('key');
        const labelTop = document.getElementById('labelWilayahTop');

        if (!userKey) {
            labelTop.innerText = "KUNCI TIDAK ADA";
            document.getElementById('errorScreen').classList.remove('hidden');
            return;
        }

        try {
            console.log("Menghubungi Server...");
            const response = await fetch(`${SCRIPT_URL}?action=read&key=${userKey}`);
            
            if (!response.ok) throw new Error("Server Google Tidak Merespon");

            const data = await response.json();
            
            if (data.status === "unauthorized") {
                labelTop.innerText = "AKSES DITOLAK";
                document.getElementById('errorScreen').classList.remove('hidden');
                return;
            }

            // Tampilkan konten jika sukses
            document.getElementById('mainContent').classList.remove('hidden');
            labelTop.innerText = `WILAYAH: ${data.wilayah}`;
            document.getElementById('labelWilayah').innerText = `Laporan untuk wilayah ${data.wilayah}`;
            document.getElementById('totalSiswa').innerText = data.totalSiswa.toLocaleString('id-ID');
            document.getElementById('avgPartisipasi').innerText = data.avgRate + "%";
            document.getElementById('totalEvent').innerText = data.totalSekolah + " Sekolah";
            document.getElementById('progressBar').style.width = data.avgRate + "%";

            // Render Tabel
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = data.recent.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5 font-bold text-slate-800 uppercase tracking-tight">${item.sekolah}</td>
                    <td class="px-8 py-5 text-center font-extrabold text-blue-600">${item.ikut}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[9px] font-black uppercase italic tracking-tighter italic border border-green-200">Terverifikasi</span>
                    </td>
                </tr>
            `).join('');

            renderChart(data.recent);

        } catch (error) {
            labelTop.innerText = "ERROR KONEKSI";
            console.error("Detail Error:", error);
            alert("Terjadi masalah saat memuat data. Pastikan URL Script benar dan izin sudah Anyone.");
        }
    }
    // ... sisa fungsi renderChart tetap sama
</script>
