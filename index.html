<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Event VR - Triesakti Edutainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        <div class="h-2 bg-gradient-to-r from-blue-600 to-indigo-700"></div>

        <div class="p-8 md:p-10">
            <div class="text-center mb-10">
                <img src="logo Edutainment.png" 
                     alt="Logo Triesakti Edutainment" 
                     class="mx-auto mb-6 w-48 h-auto object-contain">
                
                <h1 class="text-xl font-black text-slate-800 tracking-tight uppercase">Monitoring Event VR</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em] mt-1 font-bold">Field Operator Reporting</p>
            </div>

            <form id="eventForm" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Nama Sekolah</label>
                    <input type="text" id="namaSekolah" required placeholder="Masukkan Nama Sekolah"
                        class="mt-1 block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-semibold text-slate-700">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Wilayah / Kota</label>
                    <select id="kota" required 
                        class="mt-1 block w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold text-slate-700 appearance-none">
                        <option value="" disabled selected>Pilih Wilayah...</option>
                        <option value="MAKASSAR">MAKASSAR</option>
                        <option value="MAROS">MAROS</option>
                        <option value="PALOPO">PALOPO</option>
                        <option value="TARAKAN">TARAKAN</option>
                        <option value="SAMARINDA">SAMARINDA</option>
                        <option value="BALIKPAPAN">BALIKPAPAN</option>
                        <option value="TENGGARONG">TENGGARONG</option>
                        <option value="BERAU">BERAU</option>
                        <option value="BANJARMASIN">BANJARMASIN</option>
                        <option value="MATARAM">MATARAM</option>
                        <option value="BATAM">BATAM</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Tanggal</label>
                        <input type="date" id="tanggal" required
                            class="mt-1 block w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-bold text-slate-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 text-blue-600">Sesi Ke-</label>
                        <select id="hariKe" required 
                            class="mt-1 block w-full px-4 py-4 bg-blue-50 border border-blue-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-black text-blue-700">
                            <option value="1">Hari Ke-1</option>
                            <option value="2">Hari Ke-2</option>
                            <option value="3">Hari Ke-3</option>
                            <option value="Full">Full (1 Hari)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Siswa Dapodik</label>
                        <input type="number" id="jmlDapodik" required placeholder="0"
                            class="mt-1 block w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center font-black text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1 text-blue-600">Siswa Ikut VR</label>
                        <input type="number" id="jmlIkut" required placeholder="0"
                            class="mt-1 block w-full px-4 py-4 bg-blue-50 border border-blue-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center font-black text-blue-700">
                    </div>
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-5 rounded-3xl shadow-xl transition-all transform active:scale-[0.97] flex items-center justify-center mt-6 uppercase tracking-widest text-sm">
                    <span id="btnText">Simpan Laporan Hari Ini</span>
                    <div id="loader" class="hidden loader ease-linear rounded-full border-2 border-t-2 border-white h-5 w-5 ml-3"></div>
                </button>
            </form>

            <div id="message" class="hidden mt-8 p-4 rounded-2xl text-center text-xs font-bold tracking-tight"></div>
        </div>
        
        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <p class="text-[9px] text-slate-400 font-bold tracking-[0.3em] uppercase">Copyright 2026, TRIESAKTI EDUTAINMENT</p>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqezHbzExOlS1rTNXPq22cPVqqymBnoaFNuRCggHKC5dKWxRJVVOxhpAgpdpxLWuPj/exec';
                            
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const msgBox = document.getElementById('message');

            const jmlDapodik = parseInt(document.getElementById('jmlDapodik').value);
            const jmlIkut = parseInt(document.getElementById('jmlIkut').value);

            if (jmlIkut > jmlDapodik) {
                alert("Kesalahan Data: Jumlah siswa ikut tidak boleh melebihi data Dapodik!");
                return;
            }

            // UI Loading State
            btn.disabled = true;
            btn.classList.add('opacity-70');
            btnText.innerText = "MENGIRIM...";
            loader.classList.remove('hidden');
            msgBox.classList.add('hidden');

            const payload = {
                namaSekolah: document.getElementById('namaSekolah').value,
                kota: document.getElementById('kota').value,
                tanggal: document.getElementById('tanggal').value,
                hariKe: document.getElementById('hariKe').value,
                jmlDapodik: jmlDapodik,
                jmlIkut: jmlIkut
            };

            try {
                // Menggunakan mode 'cors' dan headers yang tepat untuk Google Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Solusi jitu untuk masalah "Failed to fetch" pada Google Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Karena no-cors, kita tidak bisa membaca response JSON, tapi kita tahu data terkirim jika tidak masuk ke catch
                msgBox.classList.remove('hidden', 'bg-red-50', 'text-red-700');
                msgBox.classList.add('bg-green-50', 'text-green-700');
                msgBox.innerText = "✓ LAPORAN BERHASIL TERKIRIM KE SISTEM";
                
                // Reset form hanya pada bagian data jumlah
                document.getElementById('jmlIkut').value = "";
                document.getElementById('hariKe').focus();
                
                setTimeout(() => { msgBox.classList.add('hidden'); }, 5000);

            } catch (error) {
                msgBox.classList.remove('hidden', 'bg-green-50', 'text-green-700');
                msgBox.classList.add('bg-red-50', 'text-red-700');
                msgBox.innerText = "GAGAL: JARINGAN BERMASALAH ATAU URL SALAH";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                btnText.innerText = "Simpan Laporan Hari Ini";
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
